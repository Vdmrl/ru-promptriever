name: "Qwen3-4B Baseline Evaluation"
output_dir: "./results_followir_eng"
device: "cuda:0"
dtype: "bfloat16"
retrieval_top_k: 100

models:
  - name: "Qwen3-4B-baseline"
    type: "causal_lm"
    model_name_or_path: "Qwen/Qwen3-4B"
    max_length: 512

datasets:
  - name: "followir_eng"
    type: "en_mteb"
    task_names:
      - "Robust04InstructionRetrieval"
      - "Core17InstructionRetrieval"
      - "News21InstructionRetrieval"
      
  - name: "instructir"
    type: "en_mteb"
    task_names:
      - "InstructIR"
