device: "cuda:0"
dtype: "bfloat16"
output_dir: "./results_mfollowir_significance"
retrieval_top_k: 1000
generic_instruction: ""

models:
  - name: "promptriever-llama3.1-8b"
    type: "causal_lm"
    model_name_or_path: "samaya-ai/promptriever-llama3.1-8b-v1"
    revision: "2ead22cfb1b0e0c519c371c63c2ab90ffc511b8a"
    base_revision: "48d6d0fc4e02fb1269b36940650a1b7233035cbb"
    batch_size: 16
    max_length: 512
    query_prefix: "query:  "
    passage_prefix: "passage:  "
    append_eos: true

  - name: "ru-promptriever-qwen3-4b"
    type: "causal_lm"
    # Exact gold-mix step-300 checkpoint reported in the paper.
    model_name_or_path: "Vladimirlv/ru-promptriever-qwen3-4b-v3"
    revision: "e51c0133ad5a67c9c374aa97eddc008037d45e29"
    base_revision: "1cfa9a7208912126459214e8b04321603b3df60c"
    batch_size: 4
    max_length: 512
    append_eos: true

datasets:
  - name: "mfollowir_ru"
    type: "mfollowir"
    data_path: "jhu-clsp/mFollowIR"
    revision: "09eecbe45c54b4a6dfb8e68e345cae77337768e2"
    save_predictions: true
    metrics:
      - "ndcg_at_20"
      - "p_mrr"
