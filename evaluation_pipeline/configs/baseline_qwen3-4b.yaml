# =============================================================================
# Evaluation Pipeline Configuration — Baseline: Qwen3-4B
# =============================================================================

# --- General ---
device: "cuda:0"
dtype: "bfloat16"
output_dir: "./results"
# Must be >= the largest metric cutoff used (e.g. 1000 for p-MRR computation).
retrieval_top_k: 1000

# Generic instruction appended to queries for Promptriever-type models on
# ruMTEB/BEIR benchmarks where no per-instance instruction exists. Set to an
# empty string to evaluate without any instruction prefix.
generic_instruction: ""

# --- Models ---
models:
  - name: "bm25"
    type: "bm25"
    batch_size: 512

  - name: "multilingual-e5-large"
    type: "encoder"
    model_name_or_path: "intfloat/multilingual-e5-large"
    batch_size: 64
    max_length: 512
    # E5 models require explicit "query: " / "passage: " task prefixes at inference.
    query_prefix: "query: "
    passage_prefix: "passage: "

  - name: "bge-m3"
    type: "encoder"
    model_name_or_path: "BAAI/bge-m3"
    batch_size: 64
    max_length: 512
    query_prefix: ""
    passage_prefix: ""

  - name: "promptriever-llama3.1-8b"
    type: "causal_lm"
    model_name_or_path: "samaya-ai/promptriever-llama3.1-8b-v1"
    batch_size: 16
    max_length: 512
    # Double-space separator after prefix is required by the Promptriever HF model card.
    query_prefix: "query:  "
    passage_prefix: "passage:  "

  - name: "qwen3-embedding-4b"
    type: "qwen3_embedding"
    model_name_or_path: "Qwen/Qwen3-Embedding-4B"
    batch_size: 32
    max_length: 512

  - name: "ru-promptriever-qwen3-4b"
    type: "causal_lm"
    model_name_or_path: "Vladimirlv/ru-promptriever-qwen3-4b"
    batch_size: 4
    max_length: 512

  - name: "giga-embeddings-instruct"
    type: "giga_embedding"
    model_name_or_path: "ai-sage/Giga-Embeddings-instruct"
    batch_size: 32
    max_length: 512
    query_prompt: "Instruct: Дан вопрос, необходимо найти абзац текста с ответом\nQuery: "

  - name: "ru-promptriever-qwen3-4b-continues-1epoch"
    type: "causal_lm"
    model_name_or_path: "./output_ru-promptriever-continue/checkpoint-220"
    batch_size: 4
    max_length: 512

  - name: "ru-promptriever-qwen3-4b-continues-2epoch"
    type: "causal_lm"
    model_name_or_path: "./output_ru-promptriever-continue/checkpoint-444"
    batch_size: 4
    max_length: 512

  - name: "ru-promptriever-qwen3-0.6b-1epoch"
    type: "causal_lm"
    model_name_or_path: "./output_ru-promptriever-qwen3-0.6b/checkpoint-320"
    batch_size: 16
    max_length: 512

  - name: "ru-promptriever-qwen3-0.6b-2epoch"
    type: "causal_lm"
    model_name_or_path: "./output_ru-promptriever-qwen3-0.6b/checkpoint-646"
    batch_size: 16
    max_length: 512

# --- Datasets ---
datasets:
  - name: "synthetic_test"
    type: "synthetic_test"
    data_path: "Vladimirlv/ru-promptriever-dataset-v0.1"
    split: "test"
    metrics:
      - "ndcg_at_20"
      - "p_mrr"

  - name: "mfollowir_ru"
    type: "mfollowir"
    # Russian split of mFollowIR: https://huggingface.co/datasets/jhu-clsp/mFollowIR
    data_path: "jhu-clsp/mFollowIR"
    metrics:
      - "ndcg_at_20"
      - "p_mrr"

  - name: "rumteb_retrieval"
    type: "rumteb"
    # Standard Russian retrieval tasks from the MTEB benchmark suite.
    task_names:
      - "RuBQRetrieval"
    metrics:
      - "ndcg_at_10"

  # English MTEB sanity-check tasks: small collections with fast runtimes.
  # SciFact: 5 k docs, 300 queries. NFCorpus: 3.6 k docs, 323 queries.
  # Used to verify that model scores align with published Promptriever paper results.
  - name: "en_mteb_retrieval"
    type: "en_mteb"
    task_names:
      - "SciFact"
      - "NFCorpus"
    metrics:
      - "ndcg_at_10"
