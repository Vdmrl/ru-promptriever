# =============================================================================
# Experiment 1: Baseline training on un-filtered dataset (V0.1)
# Config for full training on Vast.ai (2x RTX 5090)
# Launch: deepspeed --num_gpus=2 train.py --config configs/exp1_v0.1_base_2_5090.yaml
# =============================================================================

# --- General Hub & Logging ---
hub_model_id: "Vladimirlv/ru-promptriever-v0.1-baseline"
wandb_project: "ru-promptriever"
run_name: "exp1_v0.1_baseline"         # Used for Wandb run name
output_dir: "./output_exp1_v0.1"       # Local save directory

# --- Model ---
model_name_or_path: "Qwen/Qwen3-8B"
attn_implementation: "sdpa"  # Uses PyTorch native optimization
torch_dtype: "bfloat16"

# --- QLoRA (4-bit NF4 base + LoRA adapters — see train.py BitsAndBytesConfig) ---
# Rank and modules match RepLLaMA / Promptriever paper exactly
lora_r: 32
lora_alpha: 64            # α = 2r is a common convention; keeps effective LR stable
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# --- Data ---
train_data_path: "hf://datasets/Vladimirlv/ru-promptriever-dataset-v0.1/train.parquet"
eval_data_path: "hf://datasets/Vladimirlv/ru-promptriever-dataset-v0.1/val.parquet"
num_negatives: 30                      # Set to 30 or 33 if you want to explicitly include all instruct negatives
max_len_query: 304
max_len_passage: 256

# --- GradCache ---
# gc_chunk_size = physical sub-batch that fits in one forward pass.
# Each "virtual" batch element = 1+num_negatives=31 passages → keep small enough.
gc_chunk_size: 4                       # 4 × 31 = 124 passages per chunk; safe for 24GB VRAM

# --- Training ---
# Effective batch size = per_device × accum × num_gpus = 8 × 8 × 2 = 128
# This matches the Promptriever / RepLLaMA paper exactly.
per_device_train_batch_size: 8
gradient_accumulation_steps: 8         # Effective batch = 8 * 8 * 2 GPUs = 128
num_train_epochs: 1
max_steps: -1                          # Full epoch
learning_rate: 1.0e-4
warmup_steps: 100
fp16: false
bf16: true
evaluation_strategy: "steps"
eval_steps: 500                        # Evaluate every N steps
logging_steps: 10
save_strategy: "steps"
save_steps: 500
push_to_hub: true                      # Automatically upload to HF Hub for safety on Vast.ai
gradient_checkpointing: true
dataloader_num_workers: 4
temperature: 0.01

# --- Logging Auth ---
report_to: "wandb"
wandb_key: null
