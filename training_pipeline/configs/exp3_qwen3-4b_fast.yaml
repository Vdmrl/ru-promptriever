# =============================================================================
# Experiment 3: Qwen3-4B fast training schedule, attention-only LoRA (v0.2).
# Target hardware: 2× RTX 5090 on Vast.ai (~30–40 h/epoch).
# Launch: torchrun --nproc_per_node=2 train.py --config configs/exp3_qwen3-4b_fast.yaml
# =============================================================================

# --- General Hub & Logging ---
hub_model_id: "Vladimirlv/ru-promptriever-v0.2-optimized4b"
wandb_project: "ru-promptriever"
run_name: "v0.2_optimized4b"
output_dir: "./output_v0.2_optimized4b"

# --- Model ---
model_name_or_path: "Qwen/Qwen3-4B"
attn_implementation: "sdpa"
torch_dtype: "bfloat16"

# --- LoRA Configuration ---
# Attention-only targets (no MLP) keep adapter size small for faster iteration.
lora_r: 32
lora_alpha: 64
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# --- Data ---
train_data_path: "hf://datasets/Vladimirlv/ru-promptriever-dataset-v0.1/train.parquet"
eval_data_path: "hf://datasets/Vladimirlv/ru-promptriever-dataset-v0.1/val.parquet"
instruct_only: true              # Train on instruction-augmented rows only (~500 k vs ~1 M)
num_negatives: 7                 # Total: 3 instruction negatives + 4 BM25 hard negatives
num_instruct_negatives: 3        # Maximum instruction-negative passages per instructed query
max_len_query: 304
max_len_passage: 256

# --- GradCache ---
# With 7 negatives (8 passages per query), chunk_size=16 → 128 passages per chunk.
gc_chunk_size: 16

# --- Training ---
# Effective batch size = per_device × accum_steps × num_gpus = 8 × 8 × 2 = 128.
per_device_train_batch_size: 8
gradient_accumulation_steps: 8

tf32: true
num_train_epochs: 1
max_steps: -1
learning_rate: 1.0e-4
warmup_steps: 100
fp16: false
bf16: true
load_in_4bit: false
evaluation_strategy: "no"
# eval_steps: 500  # Disabled: GradCache .backward() conflicts with Trainer's no-grad eval pass
logging_steps: 10
save_strategy: "steps"
save_steps: 500
push_to_hub: true
gradient_checkpointing: true     # Re-enabled after resolving the CUDA OOM issue
dataloader_num_workers: 4
temperature: 0.01

# --- Logging Auth ---
report_to: "wandb"
wandb_key: null                  # Set here or via the WANDB_API_KEY environment variable
